<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrokerIQ — License Key Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Mulish',sans-serif;background:#080C14;color:#E8EEF8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#0D1420;border:1px solid #1E2D45;border-radius:16px;padding:36px 40px;width:540px;max-width:100%;}
.brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#2D7EF8;margin-bottom:4px;}
.brand span{color:#E8EEF8;}
.subtitle{font-size:12px;color:#4A5A78;font-family:'JetBrains Mono',monospace;margin-bottom:28px;}
.label{font-size:12px;font-weight:700;color:#8A9AB8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.input{width:100%;background:#121A28;border:1px solid #1E2D45;border-radius:6px;padding:10px 14px;font-family:'Mulish',sans-serif;font-size:13px;color:#E8EEF8;outline:none;margin-bottom:16px;}
.input:focus{border-color:#2D7EF8;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:#2D7EF8;color:white;font-family:'Mulish',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;margin-top:8px;}
.btn:hover{background:#1A6AE0;}
.result-wrap{margin-top:20px;display:none;}
.result-label{font-size:11px;color:#4A5A78;font-family:'JetBrains Mono',monospace;margin-bottom:6px;letter-spacing:0.08em;}
.result-key{background:#121A28;border:1px solid #243550;border-radius:8px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:15px;color:#00D48A;word-break:break-all;letter-spacing:0.04em;text-align:center;cursor:pointer;transition:border-color 0.15s;margin-bottom:8px;}
.result-key:hover{border-color:#2D7EF8;}
.copy-hint{font-size:10px;color:#4A5A78;text-align:center;font-family:'JetBrains Mono',monospace;}
.copy-hint.copied{color:#00D48A;}
.meta{background:#0D1420;border:1px solid #1E2D45;border-radius:6px;padding:12px 14px;font-size:11px;color:#8A9AB8;font-family:'JetBrains Mono',monospace;line-height:1.8;}
.divider{height:1px;background:#1E2D45;margin:24px 0;}
.history-wrap{margin-top:4px;}
.history-title{font-size:11px;color:#4A5A78;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;margin-bottom:10px;}
.history-item{background:#121A28;border:1px solid #1E2D45;border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.history-item:hover{border-color:#2D7EF8;}
.history-key{font-family:'JetBrains Mono',monospace;font-size:11px;color:#00D48A;word-break:break-all;margin-bottom:4px;}
.history-meta{font-size:10px;color:#4A5A78;font-family:'JetBrains Mono',monospace;}
.history-empty{font-size:11px;color:#4A5A78;font-family:'JetBrains Mono',monospace;text-align:center;padding:12px;}
.clear-btn{font-size:10px;color:#4A5A78;font-family:'JetBrains Mono',monospace;background:none;border:none;cursor:pointer;float:right;transition:color 0.15s;}
.clear-btn:hover{color:var(--red,#F04060);}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Broker<span>IQ</span></div>
  <div class="subtitle">// LICENSE KEY GENERATOR — INTERNAL TOOL</div>

  <div class="label">Client ID</div>
  <input class="input" id="clientId" placeholder="cth: PT01, ASURANSI-JKT" maxlength="20" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9\\-]/g,'')">

  <div class="row">
    <div>
      <div class="label">Tanggal Mulai</div>
      <input class="input" type="date" id="startDate">
    </div>
    <div>
      <div class="label">Durasi Trial</div>
      <select class="input" id="duration">
        <option value="7">7 hari</option>
        <option value="14">14 hari</option>
        <option value="30" selected>30 hari</option>
        <option value="60">60 hari</option>
        <option value="90">90 hari</option>
        <option value="365">1 tahun</option>
      </select>
    </div>
  </div>

  <button class="btn" onclick="generateKey()">⚡ Generate License Key</button>

  <div class="result-wrap" id="resultWrap">
    <div class="divider"></div>
    <div class="result-label">// LICENSE KEY</div>
    <div class="result-key" id="resultKey" onclick="copyKey()"></div>
    <div class="copy-hint" id="copyHint">klik untuk copy</div>
    <div style="margin-top:12px;">
      <div class="result-label">// DETAIL</div>
      <div class="meta" id="resultMeta"></div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="history-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="history-title">// RIWAYAT KEY</div>
      <button class="clear-btn" onclick="clearHistory()">hapus semua</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
var SALT='BRK1Q$2026#IQ';
var HISTORY_KEY='brokeriq_keygen_history';

function _encode(str){return btoa(unescape(encodeURIComponent(str)));}

function _checksum(s){
  var h=0;
  for(var i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h=h&h;}
  return Math.abs(h).toString(36).toUpperCase().slice(0,4);
}

function addDays(date, days){
  var d=new Date(date);
  d.setDate(d.getDate()+days);
  return d;
}

function fmtDate(d){
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var yyyy=d.getFullYear();
  return dd+'/'+mm+'/'+yyyy;
}

function generateKey(){
  var clientId=document.getElementById('clientId').value.trim();
  var startDateVal=document.getElementById('startDate').value;
  var duration=parseInt(document.getElementById('duration').value);

  if(!clientId){alert('Isi Client ID terlebih dahulu.');return;}
  if(!startDateVal){alert('Pilih tanggal mulai.');return;}

  var startDate=new Date(startDateVal);
  var expiryDate=addDays(startDate, duration);
  var expiryStr=fmtDate(expiryDate);
  var startStr=fmtDate(startDate);

  var encoded=_encode(expiryStr+SALT);
  var base=clientId+'-'+encoded;
  var cs=_checksum(base);
  var key='BRKIQ-'+clientId+'-'+encoded+'-'+cs;

  document.getElementById('resultKey').textContent=key;
  document.getElementById('resultMeta').innerHTML=
    'Client ID &nbsp;&nbsp;: '+clientId+'<br>'+
    'Mulai &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: '+startStr+'<br>'+
    'Expired &nbsp;&nbsp;&nbsp;: '+expiryStr+'<br>'+
    'Durasi &nbsp;&nbsp;&nbsp;&nbsp;: '+duration+' hari';
  document.getElementById('resultWrap').style.display='block';
  document.getElementById('copyHint').textContent='klik untuk copy';
  document.getElementById('copyHint').className='copy-hint';

  saveHistory({key:key, clientId:clientId, start:startStr, expiry:expiryStr, duration:duration, createdAt:Date.now()});
  renderHistory();
}

function copyKey(){
  var key=document.getElementById('resultKey').textContent;
  navigator.clipboard.writeText(key).then(function(){
    document.getElementById('copyHint').textContent='✓ Tersalin!';
    document.getElementById('copyHint').className='copy-hint copied';
    setTimeout(function(){
      document.getElementById('copyHint').textContent='klik untuk copy';
      document.getElementById('copyHint').className='copy-hint';
    },2000);
  });
}

function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];}}
function saveHistory(item){var h=getHistory();h.unshift(item);if(h.length>20)h=h.slice(0,20);localStorage.setItem(HISTORY_KEY,JSON.stringify(h));}
function clearHistory(){if(confirm('Hapus semua riwayat?')){localStorage.removeItem(HISTORY_KEY);renderHistory();}}

function renderHistory(){
  var list=getHistory();
  var el=document.getElementById('historyList');
  if(!list.length){el.innerHTML='<div class="history-empty">belum ada key yang digenerate</div>';return;}
  el.innerHTML=list.map(function(h){
    return '<div class="history-item" onclick="copyFromHistory(\''+h.key+'\')">'
      +'<div class="history-key">'+h.key+'</div>'
      +'<div class="history-meta">'+h.clientId+' &nbsp;|&nbsp; '+h.duration+' hari &nbsp;|&nbsp; expired: '+h.expiry+'</div>'
      +'</div>';
  }).join('');
}

function copyFromHistory(key){
  navigator.clipboard.writeText(key).then(function(){
    var hint=document.createElement('div');
    hint.textContent='✓ Key disalin!';
    hint.style.cssText='position:fixed;bottom:24px;right:24px;background:#00D48A;color:#080C14;padding:10px 18px;border-radius:8px;font-family:Mulish,sans-serif;font-weight:700;font-size:13px;z-index:9999;';
    document.body.appendChild(hint);
    setTimeout(function(){hint.remove();},2000);
  });
}

// Set default start date to today
var today=new Date();
document.getElementById('startDate').value=today.toISOString().slice(0,10);
renderHistory();
</script>
</body>
</html>
